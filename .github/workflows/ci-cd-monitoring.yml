name: ci-cd-monitoring

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t fintech-risk-api:ci .

      - name: Build dashboard image
        run: docker build -f docker/Dockerfile.dashboard -t fintech-risk-dashboard:ci .

  monitoring-smoke:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start API + Prometheus
        run: docker compose -f docker/docker-compose.yml up -d --build api prometheus

      - name: Wait for API metrics endpoint
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:8000/metrics > /tmp/api_metrics.txt; then
              break
            fi
            sleep 3
          done
          grep -q "fraud_api_http_requests_total" /tmp/api_metrics.txt

      - name: Check Prometheus target status
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:9090/api/v1/targets > /tmp/targets.json; then
              break
            fi
            sleep 3
          done
          grep -q "\"health\":\"up\"" /tmp/targets.json
          grep -q "fraud-api" /tmp/targets.json

      - name: Shutdown stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  publish-images:
    runs-on: ubuntu-latest
    needs: monitoring-smoke
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fintech-risk-api
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Extract metadata for dashboard image
        id: meta_dashboard
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fintech-risk-dashboard
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta_dashboard.outputs.tags }}
          labels: ${{ steps.meta_dashboard.outputs.labels }}
