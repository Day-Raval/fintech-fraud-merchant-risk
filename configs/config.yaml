project:
  name: fintech-fraud-merchant-risk
  experiment_tag: "E3_experiment"
  seed: 42

data:
  dataset_id: "D3_synthetic_fraud_data"
  output_dir: "data"

  n_customers: 5000
  n_merchants: 800
  n_cards: 7000
  n_transactions: 250000
  start_date: "2025-07-01"
  days: 120
  sigmoid_shift: 4.0   # try 4.0, 4.8, 5.5 for different fraud rates etc.

model:
  time_split_days_train: 90
  time_split_days_valid: 15
  time_split_days_test: 15

model_params:
  type: hgbt
  learning_rate: 0.08
  max_depth: 6
  max_iter: 250

decisioning:
  alert_topk_per_day: 200
  fp_investigation_cost: 7.5
  fn_loss_multiplier: 1.0

monitoring:
  psi_bins: 10
  psi_alert_threshold: 0.20
  reference_window_days: 30
  current_window_days: 7