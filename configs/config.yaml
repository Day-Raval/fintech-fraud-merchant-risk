project:
  name: fintech-fraud-merchant-risk
  experiment_tag: "E2_conservative_fp25_topk150_fn1"
  seed: 42

data:
  n_customers: 5000
  n_merchants: 800
  n_cards: 7000
  n_transactions: 250000
  start_date: "2025-07-01"
  days: 120
  output_dir: "data"
  sigmoid_shift: 4.8   # try 4.0, 4.8, 5.5 for different fraud rates etc.
  processed_dataset_path: "data/processed/fraud_dataset.csv"

model:
  time_split_days_train: 90
  time_split_days_valid: 15
  time_split_days_test: 15

model_params:
  type: hgbt
  learning_rate: 0.08
  max_depth: 6
  max_iter: 250

decisioning:
  alert_topk_per_day: 150
  fp_investigation_cost: 25.0
  fn_loss_multiplier: 1.0

artifacts:
  model_path: "artifacts/models/fraud_model.joblib"
  merchant_risk_path: "artifacts/models/merchant_risk.joblib"
  metrics_path: "artifacts/metrics/metrics.json"
  threshold_report_path: "artifacts/metrics/threshold_report.json"
  model_card_path: "artifacts/reports/model_card.md"

monitoring:
  psi_bins: 10
  psi_alert_threshold: 0.20
  reference_window_days: 30
  current_window_days: 7